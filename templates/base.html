<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Stock Agent{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <a href="{{ url_for('home') }}" class="brand">📈 Stock Agent</a>
    <span class="tag">valuation standouts · big US large-caps</span>
  </header>
  <main class="wrap">
    {% block content %}{% endblock %}
  </main>
  <footer class="foot">
    Data via Yahoo Finance (yfinance). Informational only — not investment advice.
  </footer>
</body>
</html>
